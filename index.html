<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LogiHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:'Space Grotesk',system-ui,-apple-system,sans-serif;
  background:#fbfff4;color:#203727;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  line-height:1.5;overflow-x:hidden
}
::selection{background:#203727;color:#fbfff4}
h1,h2,h3,h4{font-family:'Playfair Display',Georgia,serif;font-weight:700;letter-spacing:-.02em}
.subtitle{font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.4rem, 2.5vw, 2.2rem);font-style:italic;margin-top:1rem;display:block;font-weight:500}
.hero .subtitle,.sim-hdr .subtitle{font-size:clamp(1.5rem, 3vw, 2.6rem);margin-top:1rem}
h1 em,h2 em,h3 em{font-style:italic;font-weight:500;opacity:.55}
.c{max-width:1400px;margin:0 auto;padding:0 3rem}
@media(max-width:768px){.c{padding:0 1.5rem}}
.s{padding:10rem 0;position:relative}
@media(max-width:768px){.s{padding:5rem 0}}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;padding:2rem 0;transition:all .7s cubic-bezier(.19,1,.22,1);mix-blend-mode:difference;color:#fbfff4;pointer-events:none}
.hdr *{pointer-events:auto}
.hdr.s{padding:.8rem 0}
.hdr-i{display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:.8rem;text-decoration:none;color:inherit}
.hdr-m{width:2.5rem;height:2.5rem;display:flex;align-items:center;justify-content:center}
.hdr-m span{display:block;width:1.25rem;height:1.25rem;border:2px solid currentColor;border-radius:4px;position:relative;transition:transform .6s cubic-bezier(.34,1.56,.64,1)}
.hdr-m span::before{content:'';position:absolute;top:50%;left:50%;width:4px;height:4px;background:currentColor;border-radius:50%;transform:translate(-50%,-50%);transition:all .4s}
.hdr-l:hover .hdr-m span{transform:rotate(45deg) scale(1.1)}
.hdr-t{font-family:'Playfair Display',Georgia,serif;font-size:1.05rem;font-weight:700;letter-spacing:-.01em}
.hdr-t span{font-style:italic;opacity:.5;font-weight:500}
.hdr-n{display:flex;align-items:center;gap:3rem}
@media(max-width:768px){.hdr-n{display:none}}
.hdr-n a{font-size:.8rem;font-weight:500;text-transform:uppercase;letter-spacing:.15em;text-decoration:none;color:inherit;position:relative;padding-bottom:2px}
.hdr-n a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:currentColor;transition:width .6s cubic-bezier(.19,1,.22,1)}
.hdr-n a:hover::after{width:100%}
.hdr-mb{display:none}
@media(max-width:768px){.hdr-mb{display:flex}.hdr-mb button{background:none;border:none;color:inherit;font-size:1.2rem;cursor:pointer;padding:.25rem}}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;background:#203727;color:#fbfff4}
.hero-bg{position:absolute;inset:0;overflow:hidden}
.hero-bg .shp{position:absolute;border-radius:50%;background:rgba(251,255,244,0.015)}
.hero-bg .shp:nth-child(1){width:60vmax;height:60vmax;top:-20%;right:-15%;animation:drift 40s ease-in-out infinite}
.hero-bg .shp:nth-child(2){width:40vmax;height:40vmax;bottom:-10%;left:-10%;animation:drift 35s ease-in-out infinite reverse}
.hero-bg .shp:nth-child(3){width:25vmax;height:25vmax;top:30%;left:50%;animation:drift 30s ease-in-out infinite 5s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(5%,-5%) scale(1.05)}50%{transform:translate(-3%,3%) scale(.95)}75%{transform:translate(3%,-2%) scale(1.02)}}
.hero-g{display:grid;grid-template-columns:1.2fr 1fr;gap:5rem;align-items:center;min-height:80vh}
@media(max-width:1000px){.hero-g{grid-template-columns:1fr;gap:3rem;min-height:auto}}
.hero-tag{display:inline-block;font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.2em;color:rgba(251,255,244,0.4);margin-bottom:2rem;border:1px solid rgba(251,255,244,0.08);padding:.4rem 1rem;border-radius:9999px}
.hero h1{font-size:clamp(2.5rem,7vw,5.5rem);line-height:1.02;margin-bottom:1.5rem;color:#fbfff4}
.hero h1 strong{font-style:italic;font-weight:500;opacity:.5;display:block;margin-top:.15rem}
.hero p{font-size:clamp(.9rem,1.3vw,1.1rem);line-height:1.8;color:rgba(251,255,244,0.55);max-width:30rem;margin-bottom:3rem}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap}
.hero-btns button{font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;padding:.85rem 2rem;border-radius:9999px;border:none;cursor:pointer;transition:all .6s cubic-bezier(.19,1,.22,1);text-transform:uppercase;letter-spacing:.08em}
.hero-btns .btn-p{background:#fbfff4;color:#203727}
.hero-btns .btn-p:hover{transform:scale(1.04);box-shadow:0 20px 60px rgba(251,255,244,0.1)}
.hero-btns .btn-o{background:transparent;color:#fbfff4;box-shadow:inset 0 0 0 1.5px rgba(251,255,244,0.2)}
.hero-btns .btn-o:hover{box-shadow:inset 0 0 0 1.5px rgba(251,255,244,0.6);transform:scale(1.04)}
.hero-visual{position:relative;height:70vh;min-height:400px}
@media(max-width:1000px){.hero-visual{height:50vh;min-height:300px}}
.hero-visual canvas{position:absolute;inset:0;width:100%;height:100%}
.hero-stats{display:flex;gap:4rem;margin-top:3rem}
@media(max-width:640px){.hero-stats{gap:2rem}}
.hero-stats>div+div::before{content:'';position:absolute;left:-2rem;top:0;bottom:0;width:1px;background:rgba(251,255,244,0.06)}
.hero-sv{font-family:'Playfair Display',Georgia,serif;font-size:3rem;font-weight:700;letter-spacing:-.03em;line-height:1;color:#fbfff4;font-style:italic}
.hero-sl{font-size:.7rem;color:rgba(251,255,244,0.35);font-weight:500;margin-top:6px;text-transform:uppercase;letter-spacing:.12em}

/* ENTERPRISE */
.ent{background:#fbfff4;position:relative}
.ent::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(32,55,39,0.06)}
.ent-hdr{margin-bottom:8rem}
.ent-hdr .label{font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.2em;color:rgba(32,55,39,0.45);margin-bottom:1.5rem}
.ent-hdr h2{font-size:clamp(2rem,5vw,4rem);color:#203727;max-width:50rem;line-height:1.08}
.ent-sub{font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.2rem,2.5vw,2rem);font-style:italic;font-weight:500;opacity:.45;margin-top:.4rem;color:#203727}
.ent-g{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:rgba(32,55,39,0.06)}
@media(max-width:900px){.ent-g{grid-template-columns:1fr}}
.ent-c{background:#fbfff4;padding:4rem 3rem;transition:all .6s cubic-bezier(.19,1,.22,1)}
@media(max-width:900px){.ent-c{padding:3rem 2rem}}
.ent-c:hover{background:rgba(32,55,39,0.02)}
.ent-n{font-family:'Playfair Display',Georgia,serif;font-size:.85rem;font-weight:800;color:rgba(32,55,39,0.18);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;font-style:italic;letter-spacing:-.02em;line-height:1;pointer-events:none}
.ent-ic{width:3rem;height:3rem;margin-bottom:2rem;position:relative}
.ent-ic .dot{width:8px;height:8px;border-radius:50%;background:#203727;position:absolute;transition:all .6s cubic-bezier(.34,1.56,.64,1)}
.ent-ic .dot:nth-child(1){top:0;left:0}
.ent-ic .dot:nth-child(2){top:0;right:0;transition-delay:.1s}
.ent-ic .dot:nth-child(3){bottom:0;left:0;transition-delay:.2s}
.ent-ic .dot:nth-child(4){bottom:0;right:0;transition-delay:.3s}
.ent-c:hover .ent-ic .dot:nth-child(1){transform:translate(-4px,-4px)}
.ent-c:hover .ent-ic .dot:nth-child(2){transform:translate(4px,-4px)}
.ent-c:hover .ent-ic .dot:nth-child(3){transform:translate(-4px,4px)}
.ent-c:hover .ent-ic .dot:nth-child(4){transform:translate(4px,4px)}
.ent-c h3{font-size:1.3rem;color:#203727;margin-bottom:.8rem}
.ent-c p{font-size:.85rem;color:rgba(32,55,39,0.65);line-height:1.7;max-width:24rem}

/* DIFFUSION */
.dif{background:#203727;color:#fbfff4;position:relative}
.dif::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 30% 50%,rgba(251,255,244,0.02) 0%,transparent 60%)}
.dif-in{position:relative;z-index:2}
.dif-hdr{margin-bottom:6rem}
.dif-hdr .label{font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.2em;color:rgba(251,255,244,0.25);margin-bottom:1.5rem}
.dif-hdr h2{font-size:clamp(2rem,5vw,4rem);color:#fbfff4;max-width:50rem;line-height:1.08}
.dif-g{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;background:rgba(251,255,244,0.04)}
@media(max-width:768px){.dif-g{grid-template-columns:1fr}}
.dif-c{background:#203727;padding:4rem 3rem;transition:background .6s}
@media(max-width:768px){.dif-c{padding:3rem 2rem}}
.dif-c:hover{background:rgba(251,255,244,0.02)}
.dif-c .idx{font-family:'Playfair Display',Georgia,serif;font-size:.75rem;font-style:italic;color:rgba(251,255,244,0.15);margin-bottom:1.5rem}
.dif-c h3{font-size:1.4rem;color:#fbfff4;margin-bottom:.8rem}
.dif-c p{font-size:.85rem;color:rgba(251,255,244,0.45);line-height:1.7;max-width:24rem}
.dif-c .bar{width:2rem;height:1px;background:rgba(251,255,244,0.15);margin-top:2rem;transition:width .6s cubic-bezier(.19,1,.22,1)}
.dif-c:hover .bar{width:5rem;background:rgba(251,255,244,0.3)}

/* FLOW */
.flow{position:relative;padding:12rem 0;background:#fbfff4}
.flow::before{content:'';position:absolute;top:0;left:50%;width:1px;height:100%;background:rgba(32,55,39,0.04);transform:translateX(-50%)}
@media(max-width:768px){.flow::before{left:2rem}}
.flow-hdr{margin-bottom:8rem;text-align:center}
.flow-hdr .label{font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.2em;color:rgba(32,55,39,0.45);margin-bottom:1.5rem}
.flow-hdr h2{font-size:clamp(2rem,5vw,4rem);color:#203727;line-height:1.08}
.flow-g{position:relative}
.flow-c{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;padding:4rem 0}
@media(max-width:768px){.flow-c{grid-template-columns:1fr;gap:1.5rem;padding:3rem 0}}
.flow-c+.flow-c{border-top:1px solid rgba(32,55,39,0.04)}
.flow-i{position:relative;padding-left:7rem}
.flow-n{font-family:'Playfair Display',Georgia,serif;font-size:6rem;font-weight:800;color:rgba(32,55,39,0.07);line-height:1;position:absolute;left:0;top:-.5rem;font-style:italic;letter-spacing:-.06em}
@media(max-width:768px){.flow-i{padding-left:5rem}.flow-n{font-size:4rem}}
.flow-i h3{font-size:1.5rem;color:#203727;margin-bottom:.6rem}
.flow-i p{font-size:.85rem;color:rgba(32,55,39,0.6);line-height:1.7;max-width:26rem}
.flow-v{height:280px;border-radius:1.5rem;background:rgba(32,55,39,0.02);position:relative;overflow:hidden;border:1px solid rgba(32,55,39,0.04)}
.flow-v img{width:100%;height:100%;object-fit:cover;display:block}

/* TRANSPORT */
.transp{background:#fbfff4;position:relative;padding:10rem 0}
.transp::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(32,55,39,0.06)}
.transp-hdr{margin-bottom:6rem;text-align:center}
.transp-hdr .label{font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.2em;color:rgba(32,55,39,0.45);margin-bottom:1.5rem}
.transp-hdr h2{font-size:clamp(2rem,5vw,4rem);color:#203727;max-width:50rem;line-height:1.08;margin:0 auto}
.transp-hdr p{font-size:.9rem;color:rgba(32,55,39,0.55);max-width:28rem;margin:1rem auto 0;line-height:1.7}
.transp-g{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:rgba(32,55,39,0.06);border-radius:1.5rem;overflow:hidden}
@media(max-width:900px){.transp-g{grid-template-columns:1fr}}
.transp-c{background:#fbfff4;padding:3.5rem 2.5rem;transition:all .6s cubic-bezier(.19,1,.22,1);text-align:center}
.transp-c:hover{background:rgba(32,55,39,0.02)}
.transp-c .transp-ic{width:3.5rem;height:3.5rem;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center}
.transp-c .transp-ic svg{width:100%;height:100%}
.transp-c h3{font-size:1.2rem;color:#203727;margin-bottom:.6rem}
.transp-c p{font-size:.85rem;color:rgba(32,55,39,0.6);line-height:1.7;max-width:22rem;margin:0 auto}

/* SIMULATOR */
.sim{background:#fbfff4}
.sim-hdr{margin-bottom:5rem;text-align:center}
.sim-hdr .label{font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.2em;color:rgba(32,55,39,0.45);margin-bottom:1.5rem}
.sim-hdr h2{font-size:clamp(2rem,5vw,4rem);color:#203727;line-height:1.08}
.sim-hdr h2 em{font-style:italic;opacity:.4;font-weight:500}
.sim-hdr p{font-size:.9rem;color:rgba(32,55,39,0.55);max-width:28rem;margin:1rem auto 0;line-height:1.7}
.sim-g{display:grid;grid-template-columns:1.2fr 1fr;gap:2rem;align-items:start}
@media(max-width:1000px){.sim-g{grid-template-columns:1fr}}
.sim-f{background:rgba(32,55,39,0.02);border-radius:2rem;padding:3rem;border:1px solid rgba(32,55,39,0.04)}
@media(max-width:640px){.sim-f{padding:2rem 1.5rem;border-radius:1.5rem}}
.sim-f-hdr{font-size:1.1rem;color:#203727;margin-bottom:2rem;font-weight:600;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;gap:.6rem}
.sim-f-hdr::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#203727;flex-shrink:0}
.sim-gr{margin-bottom:1.5rem}
.sim-lb{display:block;font-size:.7rem;font-weight:600;color:rgba(32,55,39,0.6);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.08em}
.sim-in{width:100%;padding:.85rem 0;font-family:'Space Grotesk',sans-serif;font-size:.9rem;color:#203727;background:transparent;border:none;border-bottom:1px solid rgba(32,55,39,0.08);outline:none;transition:all .4s cubic-bezier(.19,1,.22,1)}
.sim-in:focus{border-bottom-color:#203727}
.sim-in::placeholder{color:rgba(32,55,39,0.2)}
.sim-div{display:flex;align-items:center;gap:1rem;margin:2rem 0}
.sim-div-l{flex:1;height:1px;background:rgba(32,55,39,0.04)}
.sim-div-t{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:rgba(32,55,39,0.2)}
.sim-btns{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:2rem}
.sim-btns button{font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:600;padding:.75rem 1.5rem;border-radius:9999px;border:none;cursor:pointer;transition:all .6s cubic-bezier(.19,1,.22,1);text-transform:uppercase;letter-spacing:.08em;flex:1;min-width:0}
@media(max-width:640px){.sim-btns button{font-size:.7rem;padding:.6rem 1rem}}
.sim-btns .btn-p{background:#203727;color:#fbfff4}
.sim-btns .btn-p:hover:not(:disabled){transform:scale(1.04);box-shadow:0 12px 40px rgba(32,55,39,0.12)}
.sim-btns .btn-p:disabled{opacity:.2;cursor:not-allowed}
.sim-btns .btn-o{background:transparent;color:#203727;box-shadow:inset 0 0 0 1px rgba(32,55,39,0.1)}
.sim-btns .btn-o:hover:not(:disabled){box-shadow:inset 0 0 0 1px #203727;transform:scale(1.03)}
.sim-btns .btn-o:disabled{opacity:.2;cursor:not-allowed}
.sim-err{font-size:.75rem;color:#c0392b;font-weight:500;display:flex;align-items:center;gap:.4rem;padding:.5rem .75rem;background:rgba(192,57,43,0.04);border-radius:.5rem;margin-bottom:.75rem}

.sim-map{background:rgba(32,55,39,0.02);border-radius:2rem;overflow:hidden;border:1px solid rgba(32,55,39,0.04);position:sticky;top:6rem}
.sim-map-in{position:relative;height:350px;overflow:hidden}
.sim-map-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(32,55,39,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(32,55,39,0.03) 1px,transparent 1px);background-size:40px 40px}
.sim-map-m{position:absolute;transform:translate(-50%,-50%);z-index:5}
.sim-map-pt{width:12px;height:12px;border-radius:50%;background:#203727;position:relative}
.sim-map-hub{width:48px;height:48px;border-radius:1rem;background:#203727;display:flex;align-items:center;justify-content:center;color:#fbfff4;font-size:.7rem;font-weight:700;box-shadow:0 8px 24px rgba(32,55,39,0.08)}
.sim-map-ld{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(251,255,244,0.8);backdrop-filter:blur(4px)}
.sim-map-ld-r{width:2rem;height:2rem;border-radius:50%;border:1.5px solid rgba(32,55,39,0.06);border-top-color:#203727;animation:spin .8s linear infinite}
.sim-map-bl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sim-map-bl .geo-dots{display:flex;gap:3px;margin-bottom:.8rem}
.sim-map-bl .geo-dots span{width:4px;height:4px;border-radius:50%;background:rgba(32,55,39,0.08)}
.sim-map-bl p{font-size:.75rem;font-weight:500;color:rgba(32,55,39,0.3)}
@keyframes spin{to{transform:rotate(360deg)}}

.sim-res{padding:1.5rem;border-top:1px solid rgba(32,55,39,0.04)}
.sim-res-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sim-res-h span{font-size:.7rem;font-weight:600;color:rgba(32,55,39,0.3);text-transform:uppercase;letter-spacing:.1em}
.sim-res-h .tag{font-size:.6rem;padding:.2rem .6rem;border-radius:9999px;background:rgba(32,55,39,0.04);color:rgba(32,55,39,0.4)}
.sim-res-g{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.sim-res-s{text-align:center;padding:.8rem;border-radius:1rem;background:rgba(32,55,39,0.015)}
.sim-res-v{font-family:'Playfair Display',Georgia,serif;font-size:1.15rem;font-weight:700;color:#203727;font-style:italic}
.sim-res-l{font-size:.6rem;color:rgba(32,55,39,0.45);font-weight:500;margin-top:3px;text-transform:uppercase;letter-spacing:.08em}

.sim-steps{margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(32,55,39,0.04)}
.sim-steps-hdr{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;font-size:.7rem;font-weight:600;color:#203727;text-transform:uppercase;letter-spacing:.08em}
.sim-steps-hdr .pulse{width:5px;height:5px;border-radius:50%;background:#203727;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.st{display:flex;align-items:center;gap:.7rem;padding:.3rem 0;opacity:0;transform:translateY(6px);transition:all .6s cubic-bezier(.19,1,.22,1)}
.st.v{opacity:1;transform:translateY(0)}
.st-c{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:700;transition:all .5s cubic-bezier(.34,1.56,.64,1)}
.st-c.d{background:#203727;color:#fbfff4}
.st-c.a{background:#203727;color:#fbfff4;animation:pulse 1.2s infinite}
.st-t{font-size:.75rem;color:rgba(32,55,39,0.55);transition:color .4s}
.st.d .st-t{color:#203727;font-weight:500}

.sim-hist{margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(32,55,39,0.04)}
.sim-hist-hdr{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:rgba(32,55,39,0.3);margin-bottom:.75rem}
.hi{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .75rem;border-radius:.75rem;background:rgba(32,55,39,0.015);border:none;cursor:pointer;text-align:left;font-family:'Space Grotesk',sans-serif;transition:all .4s cubic-bezier(.19,1,.22,1);font-size:.75rem;width:100%;margin-bottom:.3rem;color:#203727}
.hi:hover{background:rgba(32,55,39,0.04);transform:translateX(4px)}

function initCanvas(id){
  let c=document.getElementById(id);if(!c)return;
  let ctx=c.getContext('2d');
  let W,H,pts=[];
  function resize(){W=c.width=c.offsetWidth;H=c.height=c.offsetHeight;pts=[];for(let i=0;i<18;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*2+1})}
  function anim(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<pts.length;i++){
      let p=pts[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*2,0,Math.PI*2);
      ctx.fillStyle='rgba(251,255,244,0.08)';ctx.fill();
    }
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      let dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<Math.min(W,H)*0.25){
        ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle='rgba(251,255,244,'+(0.02*(1-dist/(Math.min(W,H)*0.25)))+')';
        ctx.lineWidth=.5;ctx.stroke();
      }
    }
    requestAnimationFrame(anim);
  }
  resize();anim();
  let resizeTimer;window.addEventListener('resize',function(){clearTimeout(resizeTimer);resizeTimer=setTimeout(resize,150)});
}

}

>';

function updateSim(){
  let loading=S.loading,step=S.step,res=S.res,err=S.err;
  let ok=S.pickup.trim().length>=5&&S.delivery.trim().length>=5&&vC(S.pickupCep)&&vC(S.deliveryCep);
  let calc=$('sim-calc');
  if(calc){calc.innerHTML=loading?'o Calcular':'o Calcular';calc.disabled=!ok||loading}
  let demo=$('sim-demo');if(demo)demo.disabled=loading;
  let clr=$('sim-clr');if(clr)clr.disabled=loading;
  let ca=$('sim-cancel-area');if(ca)ca.innerHTML=loading?'<button class="sim-cancel" id="sim-cancel">Cancelar</button>':'';
  let ee=$('sim-err');if(ee)ee.innerHTML=err?'<div class="sim-err"><span>o</span> '+err+'</div>':'';
  let se=$('sim-steps');
  if(se){
    if(loading){
      let h='<div class="sim-steps"><div class="sim-steps-hdr"><div class="pulse"></div> Calculando rota</div>';
      for(let i=0;i<STEPS.length;i++){
        let cls='st'+(step>i?' v d':'')+(step===i?' v a':'');
        let ic='';if(step>i)ic='-';else if(step===i)ic='o';
        let sc='st-c'+(step>i?' d':'')+(step===i?' a':'');
        h+='<div class="'+cls+'"><div class="'+sc+'">'+ic+'</div><span class="st-t">'+STEPS[i]+'</span></div>';
      }
      h+='</div>';se.innerHTML=h;
    }else{se.innerHTML=''}
  }
  let he=$('sim-hist');
  if(he){
    if(!loading&&S.hist.length){
      let h='<div class="sim-hist"><div class="sim-hist-hdr">Últimas rotas</div>';
      for(let i=0;i<Math.min(3,S.hist.length);i++){
        let r=S.hist[i];
        h+='<button class="hi" data-h="'+r.id+'"><div class="hi-dot"></div><div><div class="hi-l1">'+es(r.pickup)+'</div><div class="hi-l2"><span>-&gt;</span> <span>'+es(r.delivery)+'</span> <span>|</span> <span>'+r.tempo+'</span> <span>'+r.custo+'</span> <span>'+r.hub+'</span></div></div></button>';
      }
      h+='</div>';he.innerHTML=h;
    }else{he.innerHTML=''}
  }
  let mc=$('sim-map-c');
  if(mc){
    if(res){
      mc.innerHTML='<div style="position:absolute;inset:0"><div class="sim-map-m" style="top:26%;left:22%"><div class="sim-map-pt"></div><div style="position:absolute;top:calc(100%+6px);left:50%;transform:translateX(-50%);font-size:.6rem;color:rgba(32,55,39,0.3);white-space:nowrap">COLETA</div></div><div class="sim-map-m" style="top:48%;left:50%"><div class="sim-map-hub">H</div><div style="position:absolute;top:calc(100%+6px);left:50%;transform:translateX(-50%);font-size:.6rem;color:rgba(32,55,39,0.3);white-space:nowrap">'+res.hub+'</div></div><div class="sim-map-m" style="top:66%;left:78%"><div class="sim-map-pt"></div><div style="position:absolute;top:calc(100%+6px);left:50%;transform:translateX(-50%);font-size:.6rem;color:rgba(32,55,39,0.3);white-space:nowrap">ENTREGA</div></div><svg style="position:absolute;inset:0;pointer-events:none;z-index:1;overflow:visible" width="100%" height="100%"><line x1="22%" y1="26%" x2="50%" y2="48%" stroke="rgba(32,55,39,0.08)" stroke-width="1.5" stroke-dasharray="4,5"/><line x1="50%" y1="48%" x2="78%" y2="66%" stroke="rgba(32,55,39,0.08)" stroke-width="1.5" stroke-dasharray="4,5"/></svg></div>';
    }else if(loading){
      mc.innerHTML='<div class="sim-map-ld"><div class="sim-map-ld-r"></div></div>';
    }else{
      mc.innerHTML='<div class="sim-map-bl"><div class="geo-dots"><span></span><span></span><span></span><span></span></div><p>Preencha os dados e simule</p></div>';
    }
  }
  let re=$('sim-res');
  if(re)re.innerHTML=res?'<div class="sim-res"><div class="sim-res-h"><span>Rota calculada</span><span class="tag">otimizada</span></div><div class="sim-res-g"><div class="sim-res-s"><div class="sim-res-v">'+res.tempo+'</div><div class="sim-res-l">Tempo</div></div><div class="sim-res-s"><div class="sim-res-v">'+res.custo+'</div><div class="sim-res-l">Custo</div></div><div class="sim-res-s"><div class="sim-res-v">'+res.hub+'</div><div class="sim-res-l">Micro-hub</div></div></div></div>':'';
}

function runCalc(){
  if(!vC(S.pickupCep)||!vC(S.deliveryCep)){S.err='Formato de CEP inválido. Use 00000-000.';updateSim();toast('CEP inválido','er');return}
  if(!cC(S.pickupCep)||!cC(S.deliveryCep)){S.err='Área fora de cobertura. Tente um CEP da região central (0-7).';updateSim();toast('Área fora de cobertura','er');return}
  S.loading=true;S.step=0;S.err='';S.res=null;updateSim();
  let c=0;
  let iv=setInterval(function(){c++;S.step=c;updateSim();if(c>=STEPS.length){clearInterval(iv);setTimeout(function(){
    let h=HUBS[Math.floor(Math.random()*HUBS.length)];let tm=18+Math.floor(Math.random()*45);let cs=(8.5+Math.random()*12).toFixed(2);
    S.res={pickup:S.pickup,delivery:S.delivery,pickupCep:S.pickupCep,deliveryCep:S.deliveryCep,hub:h.nome,regiao:h.regiao,tempo:tm+' min',custo:'R$ '+cs.replace('.',',')};
    S.loading=false;S.hist.unshift({...S.res,id:Date.now()});if(S.hist.length>6)S.hist.pop();updateSim();toast('Rota calculada');
  },400)}},700);
  S.cf=function(){clearInterval(iv);S.loading=false;S.step=0;S.err='';S.cf=null;updateSim()};
}
function cancel(){if(S.cf)S.cf()}

function hOnly(){
  let e=document.querySelector('header');if(!e)return;
  let w=document.createElement('div');w.innerHTML=h();e.replaceWith(w.firstElementChild);
}

function bind(){
  window.addEventListener('scroll',function(){let s=window.scrollY>50;if(s!==S.scrolled){S.scrolled=s;hOnly()}},{passive:true});
  document.addEventListener('click',function(e){
    let n=e.target.closest('[data-n]');if(n){e.preventDefault();let el=document.getElementById(n.dataset.n);if(el)el.scrollIntoView({behavior:'smooth'});hOnly()}
    if(e.target.id==='sim-calc'&&!S.loading&&cOk())runCalc();
    if(e.target.id==='sim-demo'&&!S.loading){
      S.pickup=DEMO.pickup;S.delivery=DEMO.delivery;S.pickupCep=DEMO.pickupCep;S.deliveryCep=DEMO.deliveryCep;S.res=null;S.err='';
      let ip=$('iP');if(ip)ip.value=DEMO.pickup;
      let ipc=$('iPC');if(ipc)ipc.value=DEMO.pickupCep;
      let id=$('iD');if(id)id.value=DEMO.delivery;
      let idc=$('iDC');if(idc)idc.value=DEMO.deliveryCep;
      updateSim();
    }
    if(e.target.id==='sim-clr'){
      if(S.loading)cancel();
      S.pickup='';S.delivery='';S.pickupCep='';S.deliveryCep='';S.res=null;S.err='';
      let ip=$('iP');if(ip)ip.value='';
      let ipc=$('iPC');if(ipc)ipc.value='';
      let id=$('iD');if(id)id.value='';
      let idc=$('iDC');if(idc)idc.value='';
      updateSim();
    }
    if(e.target.id==='sim-cancel')cancel();
    let h=e.target.closest('[data-h]');if(h&&!S.loading){
      let r=null;for(let i=0;i<S.hist.length;i++)if(S.hist[i].id===Number(h.dataset.h)){r=S.hist[i];break}
      if(r){S.pickup=r.pickup;S.delivery=r.delivery;S.pickupCep=r.pickupCep||'';S.deliveryCep=r.deliveryCep||'';S.res=null;S.err='';
        let ip=$('iP');if(ip)ip.value=r.pickup;
        let ipc=$('iPC');if(ipc)ipc.value=r.pickupCep||'';
        let id=$('iD');if(id)id.value=r.delivery;
        let idc=$('iDC');if(idc)idc.value=r.deliveryCep||'';
        updateSim()}
    }
  });
  let inputs=['iP','iPC','iD','iDC'];
  for(let i=0;i<inputs.length;i++){
    (function(id){
      let el=$(id);
      if(el)el.addEventListener('input',function(e){
        let v=e.target.value;
        if(id==='iPC'){e.target.value=fC(v);S.pickupCep=e.target.value;}
        else if(id==='iDC'){e.target.value=fC(v);S.deliveryCep=e.target.value;}
        else if(id==='iP')S.pickup=v;
        else S.delivery=v;
        let calc=$('sim-calc');
        if(calc)calc.disabled=!(S.pickup.trim().length>=5&&S.delivery.trim().length>=5&&vC(S.pickupCep)&&vC(S.deliveryCep))||S.loading;
      });
    })(inputs[i]);
  }
}

function initRoadMap(){
  var rm=document.getElementById('road-map');
  var truck=document.getElementById('rm-truck');
  var pinDot=document.getElementById('rm-pin-dot');
  var markers=document.querySelectorAll('.rm-marker');
  if(!rm||!truck)return;
  var hero=document.getElementById('hero'),sim=document.getElementById('sim');
  if(!hero||!sim)return;
  var dark='#fbfff4',light='#203727';
  var sections=['hero','ent','dif','flow','transp','sim'];
  var isDark={'hero':1,'dif':1};
  function getActiveSection(){
    var vh=window.innerHeight,mid=vh/2;
    for(var i=0;i<sections.length;i++){
      var el=document.getElementById(sections[i]);
      if(!el)continue;
      var r=el.getBoundingClientRect();
      if(r.top<mid&&r.bottom>mid)return sections[i];
    }
    for(var i=0;i<sections.length;i++){
      var el=document.getElementById(sections[i]);
      if(!el)continue;
      var r=el.getBoundingClientRect();
      var vis=Math.min(r.bottom,vh)-Math.max(r.top,0);
      if(vis>0)return sections[i];
    }
    return 'ent';
  }
  function update(){
    var active=getActiveSection();
    rm.style.setProperty('--clr',isDark[active]?dark:light);
    rm.style.setProperty('--clr-inv',isDark[active]?light:dark);
    rm.style.setProperty('--truck-shadow',isDark[active]?'rgba(0,0,0,0.3)':'rgba(255,255,255,0.2)');
    var sST=window.scrollY,wh=window.innerHeight;
    var sTop=hero.offsetTop-60,sBot=sim.offsetTop+sim.offsetHeight-wh;
    if(sBot<=sTop)sBot=sTop+1;
    var p=Math.max(0,Math.min(1,(sST-sTop)/(sBot-sTop)));
    truck.style.top=(8+p*75)+'%';
    truck.style.right='28px';
    truck.style.transform='translate(50%,-50%) rotate(0deg)';
    if(markers.length)markers.forEach(function(m,i){
      var threshold=[0.08,0.32,0.55][i];
      if(p>=threshold-0.02)m.classList.add('active');
      else m.classList.remove('active');
    });
    if(pinDot)pinDot.classList.toggle('visible',p>=0.95);
    var at=document.getElementById('rm-arrival-text'),now=Date.now();
    if(at){
      if(p>=0.95&&!at.classList.contains('visible')&&(!at._cd||now-at._cd>20000)){at.classList.add('visible');at._cd=Date.now();setTimeout(function(){at.classList.remove('visible')},1000)}
      else if(p<0.95&&at.classList.contains('visible')){at.classList.remove('visible');at._cd=Date.now()}
    }
    if(p>=1){
      rm.style.opacity='0';
      rm.style.visibility='hidden';
    }else{
      rm.style.opacity='';
      rm.style.visibility='';
    }
  }
  update();
  var ticking=false;
  window.addEventListener('scroll',function(){
    if(!ticking){requestAnimationFrame(function(){update();ticking=false});ticking=true}
  },{passive:true});
  window.addEventListener('resize',function(){update()},{passive:true});
}
r();
initRoadMap();
var glowObs=new IntersectionObserver(function(entries){
  for(var i=0;i<entries.length;i++){
    var entry=entries[i];
    if(entry.isIntersecting&&!entry.target.classList.contains('animate')){
      entry.target.classList.add('animate');
    }
  }
},{threshold:0.5});
var glowEls=document.querySelectorAll('.glow,.glow-d');
for(var i=0;i<glowEls.length;i++)glowObs.observe(glowEls[i]);
})();
</script>
